<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>spiral</title>
<style>
  /* ============================================================
     PANIC ATTACK — single page experience
     Media slots you need to fill are marked with:  >>> INSERT
     ============================================================ */

  :root {
    --ink: #f2f0ec;
    --void: #060508;
    --alarm: #ff2b2b;
    --bruise: #3b1d4f;
    --static: #b9b9b9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;          /* one page, no escape by scrolling */
    background: var(--void);
    color: var(--ink);
    font-family: "Courier New", Courier, monospace;
  }

  /* ---------- LAYER 0: background spiral video ---------- */
  #spiral-video {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 0;
    filter: saturate(0.6) contrast(1.2);
    /* slow zoom drift so the spiral never feels stable */
    animation: drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { transform: scale(1) rotate(0deg); }
    to   { transform: scale(1.15) rotate(1.5deg); }
  }

  /* ---------- LAYER 1: vignette that slowly closes in ---------- */
  #vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
                transparent 35%,
                rgba(6,5,8,0.85) 100%);
    animation: tunnel 9s ease-in-out infinite alternate;
  }
  @keyframes tunnel {
    from { background: radial-gradient(ellipse at center, transparent 45%, rgba(6,5,8,0.8) 100%); }
    to   { background: radial-gradient(ellipse at center, transparent 18%, rgba(6,5,8,0.97) 100%); }
  }

  /* ---------- LAYER 2: heartbeat pulse over everything ---------- */
  #pulse {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background: var(--alarm);
    opacity: 0;
    mix-blend-mode: overlay;
    animation: heartbeat 1.1s infinite;
  }
  /* lub-dub rhythm, then it speeds up via JS */
  @keyframes heartbeat {
    0%   { opacity: 0; }
    8%   { opacity: 0.22; }
    16%  { opacity: 0; }
    28%  { opacity: 0.30; }
    40%  { opacity: 0; }
    100% { opacity: 0; }
  }

  /* ---------- LAYER 3: the popups ---------- */
  .popup {
    position: fixed;
    z-index: 10;
    max-width: min(42ch, 80vw);
    padding: 14px 18px;
    background: rgba(10, 8, 14, 0.92);
    border: 1px solid var(--static);
    box-shadow: 0 0 0 1px var(--void), 6px 6px 0 rgba(255, 43, 43, 0.35);
    animation: pop-in 0.12s steps(2) both;
    cursor: pointer;
  }
  .popup.urgent {
    border-color: var(--alarm);
    color: var(--alarm);
    animation: pop-in 0.12s steps(2) both, jitter 0.3s steps(2) infinite;
  }
  .popup .titlebar {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--static);
    border-bottom: 1px dashed rgba(185,185,185,0.4);
    padding-bottom: 6px;
    margin-bottom: 8px;
  }
  .popup .titlebar .x { color: var(--alarm); }
  .popup p {
    font-size: clamp(13px, 1.6vw, 17px);
    line-height: 1.45;
  }

  /* image popups — these hold YOUR images */
  .popup.img-popup { padding: 6px; }
  .popup.img-popup img {
    display: block;
    width: min(34vw, 320px);
    height: auto;
    filter: grayscale(0.5) contrast(1.3);
  }

  @keyframes pop-in {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  @keyframes jitter {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(-2px, 1px); }
    50%  { transform: translate(2px, -1px); }
    75%  { transform: translate(-1px, -2px); }
    100% { transform: translate(1px, 2px); }
  }

  /* ---------- LAYER 4: giant intrusive words that flash ---------- */
  .intrusive {
    position: fixed;
    z-index: 8;
    font-size: clamp(40px, 9vw, 130px);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: transparent;
    -webkit-text-stroke: 1px var(--ink);
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
    animation: flash 2.4s ease-out forwards;
    mix-blend-mode: difference;
  }
  @keyframes flash {
    0%   { opacity: 0; transform: scale(1.3); }
    10%  { opacity: 0.9; }
    60%  { opacity: 0.4; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.95); }
  }

  /* ---------- screen shake applied to <body> at peak ---------- */
  body.shaking { animation: shake 0.4s steps(2) infinite; }
  @keyframes shake {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(-4px, 3px); }
    50%  { transform: translate(4px, -2px); }
    75%  { transform: translate(-3px, -3px); }
    100% { transform: translate(3px, 4px); }
  }

  /* ---------- accessibility: calm everything down ---------- */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; }
    #pulse { display: none; }
  }
</style>
</head>
<body>

  <!-- ===========================================================
       >>> INSERT 1: YOUR SPIRAL VIDEO
       Replace src below with your video file (e.g. "spiral.mp4").
       Keep muted + autoplay + loop or browsers will block it.
       =========================================================== -->
  <video id="spiral-video" autoplay muted loop playsinline>
    <source src="videos/looping.mp4" type="video/mp4">
  </video>

  <div id="vignette"></div>
  <div id="pulse"></div>

<script>
/* =====================================================================
   SCRIPT: launches immediately, popups accelerate to peak intensity,
   then it stays there. No intro, no resolution — just the panic.
   ===================================================================== */

/* --- the racing thoughts. edit freely. --- */
const THOUGHTS = [
  "your heart is beating too fast",
  "everyone is looking at you",
  "you can't breathe properly",
  "something is wrong something is wrong",
  "what if it never stops",
  "you forgot how to swallow",
  "get out get out get out",
  "is this a heart attack?",
  "you're going to embarrass yourself",
  "why is the room so loud",
  "your hands are numb",
  "nobody can help you",
  "it's happening again",
  "you should have stayed home",
  "act normal. ACT NORMAL.",
  "the walls are too close",
  "you're fine you're fine you're fine you're not",
];

/* --- single flashing giant words --- */
const INTRUSIVE_WORDS = ["RUN", "BREATHE", "STOP", "NOW", "OUT", "HELP", "WHY"];

/* =====================================================================
   >>> INSERT 2: YOUR IMAGES
   Add your image filenames here. They'll pop up randomly between
   the text popups. Leave the array empty [] to disable image popups.
   ===================================================================== */
const IMAGES = [
  "images/ago2.jpg",
  "images/ago3.jpg",
  "images/download.gif"
];

/* =====================================================================
   >>> INSERT 3: YOUR AUDIO TRACKS
   Each track loops forever. It begins (silently) once the popup count
   reaches startAt, then swells toward maxVolume as the panic builds.
   rampTicks = how many popups it takes to reach full volume.
   Stagger startAt values so layers stack: heartbeat first, then more.
   ===================================================================== */
const AUDIO_TRACKS = [
  { src: "audio/heartbeat.mp3", startAt: 0,  maxVolume: 0.9, rampTicks: 30 },
  { src: "audio/earring.mp3",   startAt: 8,  maxVolume: 0.9, rampTicks: 40 },
  { src: "audio/clockticking.mp3",  startAt: 16, maxVolume: 0.7, rampTicks: 35 },
  { src: "audio/crowdyell.mp3",    startAt: 24, maxVolume: 0.6, rampTicks: 50 },
];

/* build the audio elements */
AUDIO_TRACKS.forEach(t => {
  t.el = new Audio(t.src);
  t.el.loop = true;
  t.el.volume = 0;
  t.playing = false;
});

let audioUnlocked = false;

/* =====================================================================
   >>> INSERT 4: THE ENDING
   CLIMAX_AT — ms until every message becomes GET OUT / GO HOME
   CRASH_AFTER — ms of climax before the "crash"
   RETURN_URL — where the crash dumps the player (your Twine file).
   If this page was opened with window.open / target="_blank" from
   Twine, it will try to close itself first; otherwise it redirects.
   ===================================================================== */
const CLIMAX_AT   = 30000;
const CRASH_AFTER = 6000;
const RETURN_URL  = "index_twine.html";   // <-- your Twine HTML file
const CLIMAX_WORDS = ["GET OUT", "GO HOME"];
let climaxed = false;
let crashed = false;

function startAudio() {
  if (audioUnlocked) return;
  /* try to start every track that's already due; if the browser blocks
     it, the first click/keypress will unlock them instead */
  const attempts = AUDIO_TRACKS
    .filter(t => count >= t.startAt && !t.playing)
    .map(t => t.el.play().then(() => { t.playing = true; }));
  Promise.allSettled(attempts).then(results => {
    if (results.some(r => r.status === "fulfilled")) audioUnlocked = true;
  });
}

/* fallback: unlock all audio on the user's first interaction */
["pointerdown", "keydown"].forEach(evt =>
  window.addEventListener(evt, () => { audioUnlocked = true; updateAudio(true); }, { once: true })
);

function updateAudio(forcePlay = false) {
  AUDIO_TRACKS.forEach(t => {
    if (count < t.startAt) return;
    /* start the track if it hasn't begun yet */
    if (!t.playing && (audioUnlocked || forcePlay)) {
      t.el.play().then(() => { t.playing = true; }).catch(() => {});
    }
    /* swell: volume climbs with the popup count, capped at maxVolume */
    const progress = (count - t.startAt) / t.rampTicks;
    t.el.volume = Math.min(t.maxVolume, Math.max(0, progress * t.maxVolume));
  });
}

const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

let interval = 1400;       // starting gap between popups (ms)
const MIN_INTERVAL = 220;  // fastest gap at the peak
const ACCEL = 0.93;        // each popup arrives 7% sooner than the last
const PEAK_AT = 28;        // popup count where shaking starts
const MAX_ON_SCREEN = 70;  // oldest popups recycle so the browser survives forever
let count = 0;

const rand = (min, max) => Math.random() * (max - min) + min;

/* keep the DOM from growing infinitely — the layering stays dense,
   but the oldest popups quietly disappear underneath the new ones */
function cullOldest() {
  const popups = document.querySelectorAll(".popup");
  if (popups.length > MAX_ON_SCREEN) popups[0].remove();
}

function randomPosition(el) {
  el.style.left = rand(2, 60) + "vw";
  el.style.top  = rand(4, 70) + "vh";
  el.style.transform = `rotate(${rand(-4, 4)}deg)`;
}

function spawnTextPopup() {
  const div = document.createElement("div");
  div.className = "popup" + ((climaxed || Math.random() < 0.3) ? " urgent" : "");
  const msg = climaxed
    ? CLIMAX_WORDS[Math.floor(Math.random() * CLIMAX_WORDS.length)]
    : THOUGHTS[Math.floor(Math.random() * THOUGHTS.length)];
  div.innerHTML = `
    <div class="titlebar"><span>warning.exe</span><span class="x">✕</span></div>
    <p>${msg}</p>`;
  randomPosition(div);
  /* clicking a popup closes it — but two more appear (whack-a-mole anxiety) */
  div.addEventListener("click", () => {
    div.remove();
    spawnTextPopup();
    spawnTextPopup();
  });
  document.body.appendChild(div);
  cullOldest();
}

function spawnImagePopup() {
  if (!IMAGES.length) return spawnTextPopup();
  const div = document.createElement("div");
  div.className = "popup img-popup";
  const src = IMAGES[Math.floor(Math.random() * IMAGES.length)];
  div.innerHTML = `
    <div class="titlebar"><span>memory.jpg</span><span class="x">✕</span></div>
    <img src="${src}" alt="">`;
  randomPosition(div);
  div.addEventListener("click", () => div.remove());
  document.body.appendChild(div);
  cullOldest();
}

function spawnIntrusiveWord() {
  const span = document.createElement("div");
  span.className = "intrusive";
  const pool = climaxed ? CLIMAX_WORDS : INTRUSIVE_WORDS;
  span.textContent = pool[Math.floor(Math.random() * pool.length)];
  span.style.left = rand(0, 50) + "vw";
  span.style.top  = rand(10, 80) + "vh";
  document.body.appendChild(span);
  setTimeout(() => span.remove(), 2500);
}

function tick() {
  if (crashed) return;
  count++;

  /* mix of popup types */
  const roll = Math.random();
  if (roll < 0.55)      spawnTextPopup();
  else if (roll < 0.8)  spawnImagePopup();
  else                  spawnIntrusiveWord();

  /* escalate */
  if (count === PEAK_AT && !reducedMotion) document.body.classList.add("shaking");

  /* faster heartbeat as it builds */
  const pulse = document.getElementById("pulse");
  pulse.style.animationDuration = Math.max(0.45, 1.1 - count * 0.015) + "s";

  /* audio layers start and swell with the escalation */
  updateAudio();

  /* no resolution — climax() takes over at CLIMAX_AT */
  interval = Math.max(MIN_INTERVAL, interval * ACCEL);
  setTimeout(tick, interval);
}

/* ---- at 20s: every message on screen becomes GET OUT / GO HOME ---- */
function climax() {
  climaxed = true;

  /* rewrite every popup already on screen */
  document.querySelectorAll(".popup p").forEach(p => {
    p.textContent = CLIMAX_WORDS[Math.floor(Math.random() * CLIMAX_WORDS.length)];
    p.closest(".popup").classList.add("urgent");
  });
  document.querySelectorAll(".intrusive").forEach(el => {
    el.textContent = CLIMAX_WORDS[Math.floor(Math.random() * CLIMAX_WORDS.length)];
  });

  /* crescendo: max spawn rate, full shake, audio slammed to ceiling */
  interval = MIN_INTERVAL * 0.6;
  if (!reducedMotion) document.body.classList.add("shaking");
  AUDIO_TRACKS.forEach(t => {
    if (!t.playing && audioUnlocked) t.el.play().then(() => { t.playing = true; }).catch(() => {});
    t.el.volume = t.maxVolume;
  });

  setTimeout(crash, CRASH_AFTER);
}

/* ---- the "crash": hard cut, fake error, then back to Twine ---- */
function crash() {
  crashed = true;
  /* silence everything instantly */
  AUDIO_TRACKS.forEach(t => { t.el.pause(); });
  document.body.classList.remove("shaking");

  /* hard cut to black with a fake fatal error */
  document.body.innerHTML = `
    <div style="position:fixed;inset:0;background:#000;color:#888;
                font-family:'Courier New',monospace;font-size:13px;
                display:flex;align-items:center;justify-content:center;">
      <span>fatal error 0x000F — session terminated_</span>
    </div>`;

  setTimeout(() => {
    window.close();                       /* works if Twine opened this tab */
    window.location.href = RETURN_URL;    /* fallback: redirect to Twine */
  }, 1500);
}

/* launch immediately on load — no intro, no gate */
window.addEventListener("load", () => {
  document.getElementById("spiral-video").play().catch(() => {});
  startAudio();   /* will succeed or silently wait for first interaction */
  if (reducedMotion) { interval = 2600; } /* gentler pacing if requested by OS */
  tick();
  setTimeout(climax, CLIMAX_AT);
});
</script>
</body>
</html>
